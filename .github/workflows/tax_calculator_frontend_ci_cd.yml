name: Tax Calculator Frontend  CI/CD to AWS EKS

on:
    workflow_dispatch

#Build and test the application
#Docker build and push the image to Docker Hub
#Deploy to EKS
#we can apply to the backend services such as service-a, service-b

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

              #we are building react vite. for kubernetes we need to have the environment variable exist during the build time. 
            - name: Create .env for Build
              working-directory: tax-calculator-frontend
              run: "echo VITE_API_URL=/api > .env"

            - name: SetUp Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '25'

            #Clean and install
            - name: Install dependencies
              working-directory: tax-calculator-frontend
              run: npm ci

            - name: Run Tests
              working-directory: tax-calculator-frontend
              run: npm test --if-present

          
            - name: Build the frontend
              working-directory: tax-calculator-frontend
              run: npm run build

    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test
                  
        steps:
            - name: Checkout code
              uses: actions/checkout@v4


            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

              #we are building react vite. for kubernetes we need to have the environment variable exist during the build time. 
            - name: Create .env for Build
              working-directory: tax-calculator-frontend
              run: "echo VITE_API_URL=/api > .env"

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with: 
                context: tax-calculator-frontend
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/tax-calculator-frontend:latest

    deploy-aws-eks:
        runs-on: ubuntu-latest
        needs: docker-build-push
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v5.1.1
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
                aws-region: us-east-1

            - name: Setup kubectl
              uses: azure/setup-kubectl@v4

            - name: Update kubeconfig for EKS
              run: aws eks update-kubeconfig --region ap-south-1 --name hello-cluster-simple-one

            - name: Verify connection
              run: kubectl get nodes

            - name: Deploy to AWS (Kubernetes)
              run: |
                    kubectl apply -f k8s/frontend
                    kubetcl apply -f k8s/ingress.yaml

            


