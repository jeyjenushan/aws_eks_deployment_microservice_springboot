name: Tax Calculator Spring CI/CD

on:
    workflow_dispatch

#Build and test the application
#Docker build and push the image to Docker Hub
#Deploy to EKS
#we can apply to the backend services such as service-a, service-b

jobs:
    build-test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service: [service-a, service-b]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup JDK
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin'
                java-version: '21'

            - name: Build and Test(Maven)
              working-directory: microservices/${{ matrix.service }}
              run: mvn -B clean verify

            - name: Upload Test Reports
              uses: actions/upload-artifact@v4
              with:
                name: test-reports
                path: microservices/${{ matrix.service }}/target/surefire-reports/*.xml


    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test
        strategy:
            matrix:
                service:
                    - {name: service-a, docker_name:"tax-service-a", path:"microservices/service-a"}
                    - {name: service-b, docker_name:"tax-service-b", path:"microservices/service-b"}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup JDK
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin'
                java-version: '21'

            - name: Build JAR for Docker
              working-directory: ${{ matrix.service.path }}
              run: mvn -B clean package -DskipTests

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with: 
                context: ${{ matrix.service.path }}
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.docker_name }}:latest

    deploy-aws-eks:
        runs-on: ubuntu-latest
        needs: docker-build-push
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v5.1.1
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
                aws-region: us-east-1

            - name: Setup kubectl
              uses: azure/setup-kubectl@v4

            - name: Update kubeconfig for EKS
              run: aws eks update-kubeconfig --region ap-south-1 --name hello-cluster-simple-one

            - name: Verify connection
              run: kubectl get nodes

            - name: Deploy to AWS (Kubernetes)
              run: |
                    kubectl apply -f k8s/service-a
                    kubectl apply -f k8s/service-b

            


