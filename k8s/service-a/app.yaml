#Defining the deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:  
    metadata:
      labels:
        app: service-a
    spec:
      containers:
        - name: service-a
          image: jenushan264/tax-service-a:latest
          env:
            - name: TAX_SERVICE_URL
              value: "http://service-b:4000"
        #  env:
         #   - name: APP_MESSAGE
          #    valueFrom:
           #     configMapKeyRef:
            #      name: helloapp-config
             #     key: ENV_VALUE
            #- name: DB_PASSWORD
             # valueFrom:
              #  secretKeyRef:
               #   name: db-secret
               # key: DB_PASSWORD
          ports:
            - containerPort: 3000
---
#Defining the service
apiVersion: v1
kind: Service
metadata:
  name: service-a
spec:
  selector:
    app: service-a
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000